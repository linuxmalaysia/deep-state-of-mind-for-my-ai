---
# ==============================================================================
# DSOM Ansible Inventory — deep-state-of-mind-for-my-ai
# Project: deep-state-of-mind-for-my-ai
# Standard: DSOM For My AI Protocol v6.1
# Last Updated: 2026-04-05
#
# IMPORTANT: This file must NOT contain secrets.
#            Use ansible-vault for credentials.
#
# Environment: Localhost-first (T1/T2 = same Ubuntu 24.04 machine)
# T3/T4:       localhost — /opt/deep-state-of-mind-for-my-ai
# ==============================================================================

all:
  vars:
    ansible_user: "linuxmalaysia"
    ansible_python_interpreter: "/usr/bin/python3"

  children:

    # ── Tier 1 & 2: Command Centre / Dev Bridge (localhost) ──────────────────
    # This machine is both the Ansible control node and the target for local runs.
    local:
      hosts:
        localhost:
          ansible_connection: local
          ansible_user: "linuxmalaysia"
          tier: "T1/T2"
          role: "Command Centre / Dev Bridge"

    # ── Tier 3: Staging / UAT ────────────────────────────────────────────────
    # Uncomment and fill in when you have a staging node.
    # staging:
    #   hosts:
    #     staging-node-01:
    #       ansible_host: "[STAGING_IP_OR_HOSTNAME]"
    #       ansible_user: "linuxmalaysia"
    #       tier: "T3"
    #       role: "Pre-production validation"

    # ── Tier 4: Production ───────────────────────────────────────────────────
    # Uncomment and fill in when you have a production node.
    # production:
    #   hosts:
    #     prod-node-01:
    #       ansible_host: "[PROD_IP_OR_HOSTNAME]"
    #       ansible_user: "linuxmalaysia"
    #       tier: "T4"
    #       role: "Live system — zero-tolerance for ad-hoc changes"
