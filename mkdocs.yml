site_name: Deep State of Mind (DSOM)
site_description: A metacognitive governance framework for AI.
site_author: Harisfazillah Jamel (LinuxMalaysia)
repo_url: https://github.com/linuxmalaysia/deep-state-of-mind-for-my-ai
edit_uri: blob/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: purple
    - scheme: slate
      primary: teal
      accent: purple
  features:
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

nav:
  - Home: README.md
  - START HERE: START-HERE.md
  - Governance:
