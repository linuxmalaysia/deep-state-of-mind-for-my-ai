---
# playbooks/dsom/site.yml
# DSOM Baseline Execution Playbook
# This is the scaffold for human-approved Sovereign execution.

- name: DSOM Pre-flight checks and baseline configuration
  hosts: all
  become: yes
  vars:
    project_name: "deep-state-of-mind-for-my-ai"
  
  pre_tasks:
    - name: Run audit-preflight checks
      ansible.builtin.import_playbook: audit-preflight.yml
      tags: preflight

  roles:
    # Add project-specific roles here.
    # Architecture: Advisory over Execution. Logic over Operation.
    # - role: common
    # - role: secure-baseline

  tasks:
    - name: Ensure target application path exists
      ansible.builtin.file:
        path: "/opt/{{ project_name }}"
        state: directory
        owner: "{{ ansible_user | default('root') }}"
        group: "{{ ansible_user | default('root') }}"
        mode: '0750'
