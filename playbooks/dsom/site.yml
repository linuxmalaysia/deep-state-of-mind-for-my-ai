# ==============================================================================
# 🚀 DSOM Ansible Playbook: site.yml (v1.0)
#
# Master entry point for all DSOM operational playbooks.
# Author:   Harisfazillah Jamel (LinuxMalaysia)
# License:  GNU GPL v3.0 or later
#
# Usage:
#   # Full pre-flight audit on localhost
#   ansible-playbook playbooks/dsom/site.yml -i localhost,
#
#   # Full pre-flight on all inventory nodes
#   ansible-playbook playbooks/dsom/site.yml -i inventory/hosts.yml
#
#   # Only run specific tags
#   ansible-playbook playbooks/dsom/site.yml -i localhost, --tags audit
#   ansible-playbook playbooks/dsom/site.yml -i localhost, --tags init
# ==============================================================================

- name: "DSOM | Full Pre-Flight Audit"
  import_playbook: audit-preflight.yml
  tags: ["audit", "preflight"]

- name: "DSOM | Brain Initialisation"
  import_playbook: init-brain.yml
  tags: ["init", "brain"]
