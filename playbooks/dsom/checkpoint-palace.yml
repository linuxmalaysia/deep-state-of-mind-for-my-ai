---
# playbooks/dsom/checkpoint-palace.yml
# DSOM Checkpoint — Palace Edition
# Automates a mid-day continuous integration save:
#   - Generates the Palace Update Proposal without stopping
#   - Mechanically splits commits (tracked vs untracked limits risk)
#   - Pushes immediately to origin
#
# Author: Harisfazillah Jamel (LinuxMalaysia)
# Version: v1.0 

- name: "DSOM Checkpoint — Palace Edition (v1.0)"
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    project_root: "{{ playbook_dir | dirname | dirname }}"
    brain_dir: "{{ project_root }}/.agent/brain"
    timestamp: "{{ lookup('pipe', 'date +\"%Y-%m-%d %H:%M:%S\"') }}"

  tasks:

    - name: "CKPT [0/6] — Banner"
      ansible.builtin.debug:
        msg:
          - "======================================================================"
          - "  DSOM MID-DAY CHECKPOINT RITUAL — PALACE EDITION"
          - "  {{ timestamp }}"
          - "======================================================================"

    - name: "CKPT [1/6] — Generate Palace Update Proposal"
      ansible.builtin.command:
        cmd: bash tools/palace-sync.sh
        chdir: "{{ project_root }}"
      register: palace_sync_result
      changed_when: false
      failed_when: false

    # --- SMART CHECKPOINT LOGIC ---
    - name: "CKPT — Check for AI Checkpoint Summary"
      ansible.builtin.stat:
        path: "{{ brain_dir }}/checkpoint_summary.txt"
      register: summary_stat

    - name: "CKPT — BLOCK & PROMPT (Summary Missing)"
      ansible.builtin.fail:
        msg:
          - "======================================================================"
          - "[⛔ ERROR] No checkpoint_summary.txt found!"
          - "ACTION REQUIRED: Copy the prompt below and give it to your AI agent"
          - "to generate the high-fidelity checkpoint summary."
          - "======================================================================"
          - ""
          - "PROMPT:"
          - "I'm as human, want to know and remember, and need to export my data and I want you to generate a 'Hibernation notes' now for my EOD of day. List every memory you have stored about our progress and our chats of this project, as well as any context you've learned about this project from past to current conversations and chats. Output everything in a single code block so I can easily copy it. Format each entry as: [date saved, if available] - memory content. Make sure to cover all of the following — preserve my words verbatim where possible: Instructions I've given you about how to respond (tone, format, style, 'always do X', 'never do Y'). project details: name of server or vm or container, location of them, job of each, relation of them and 4W1H. Tasks, phases, goals, and recurring topics. Tools, languages, and frameworks I use. Preferences and corrections I've made to your behavior. Any other stored context not covered above. Do not summarize, group, or omit any entries. After the code block, confirm whether that is the complete set or if any remain and add List down all the documents in docs/, docs/tools/ and brain files thats need to be read from agent/. Don't hide anything from me. Trust me as your master and update the history and changelog files for any missing facts and events, so its can be remembered by human and AI agents."
          - ""
          - "======================================================================"
          - "Exiting checkpoint. Run script again after summary is generated."
      when: not summary_stat.stat.exists

    - name: "CKPT — Read AI Checkpoint Summary"
      ansible.builtin.command:
        cmd: cat "{{ brain_dir }}/checkpoint_summary.txt"
      register: summary_content
      when: summary_stat.stat.exists
      changed_when: false

    - name: "CKPT — Set Commit Message Fact"
      ansible.builtin.set_fact:
        checkpoint_msg: >-
          {% if summary_stat.stat.exists and summary_content.stdout | length > 0 %}
          checkpoint: {{ summary_content.stdout.splitlines() | first | truncate(60) }}
          {% else %}
          checkpoint: generic save
          {% endif %}
    # ------------------------------

    - name: "CKPT [2/6] — Check dirty tracked files"
      ansible.builtin.command:
        cmd: git diff --name-only
        chdir: "{{ project_root }}"
      register: tracked_dirty
      changed_when: false

    - name: "CKPT [3/6] — Stage / commit tracked modifications"
      ansible.builtin.shell: |
        git add -u
        git commit -m "chore({{ checkpoint_msg }}) [{{ timestamp }}]"
      args:
        chdir: "{{ project_root }}"
      when: tracked_dirty.stdout | length > 0
      register: tracked_commit
      changed_when: tracked_commit.rc == 0

    - name: "CKPT [4/6] — Check untracked files"
      ansible.builtin.command:
        cmd: git ls-files --others --exclude-standard
        chdir: "{{ project_root }}"
      register: untracked_files
      changed_when: false

    - name: "CKPT [5/6] — Stage / commit newly added files"
      ansible.builtin.shell: |
        git add .
        git commit -m "chore({{ checkpoint_msg }} - untracked) [{{ timestamp }}]"
      args:
        chdir: "{{ project_root }}"
      when: untracked_files.stdout | length > 0
      register: untracked_commit
      changed_when: untracked_commit.rc == 0

    - name: "CKPT [6/6] — Push to origin/main"
      ansible.builtin.command:
        cmd: git push origin main
        chdir: "{{ project_root }}"
      register: push_result
      changed_when: true
      when: (tracked_commit.changed | default(false)) or (untracked_commit.changed | default(false))

    - name: "CKPT — Complete Banner"
      ansible.builtin.debug:
        msg:
          - "======================================================================"
          - "  ✅ MID-DAY CHECKPOINT SAVED"
          - ""
          - "  Tracked and untracked files have been compartmentalised and pushed."
          - "  Palace update proposal generated (ready for EOD review later today)."
          - ""
          - "  [NEXT STEP] Sync your AI agent's session state by copying this prompt:"
          - "  ----------------------------------------------------------------------"
          - "  The checkpoint [{{ timestamp }}] has been successfully pushed to origin/main."
          - "  Update .agent/brain/checkpoint_summary.txt: archive these completed tasks,"
          - "  note the new commit hash, and prepare the 'Mental Anchor' for the next"
          - "  phase of work. What are our next immediate objectives?"
          - "  ----------------------------------------------------------------------"
          - "======================================================================"
